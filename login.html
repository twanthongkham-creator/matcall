<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATCALL – ลงชื่อเข้าใช้งาน</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231d3a70'/></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body {
      background: radial-gradient(circle at 10% 20%, rgba(26, 43, 76, 1) 0%, rgba(12, 138, 126, 0.9) 90.1%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 30px 24px;
      width: 95%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    .login-logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #1d3a70, #0c8a7e);
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      margin: 0 auto 12px;
      box-shadow: 0 4px 15px rgba(12, 138, 126, 0.3);
    }
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #1d3a70;
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 13px;
      color: #718096;
      margin-bottom: 20px;
    }
    #profiles-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      text-align: left;
    }
    .profile-card {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .profile-card:hover {
      border-color: #0c8a7e;
      background: #f0fdfa;
      transform: translateY(-1px);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .profile-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e2e8f0;
      color: #4a5568;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-info {
      flex: 1;
      min-width: 0;
    }
    .profile-name {
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      white-space: nowrap;
      overflow: hidden;
      text-transform: capitalize;
      text-overflow: ellipsis;
    }
    .profile-role {
      font-size: 11px;
      color: #718096;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spinner-wrap {
      grid-column: span 2;
      padding: 30px 0;
      text-align: center;
    }
    @media (max-width: 576px) {
      .login-container {
        padding: 24px 16px;
      }
      #profiles-list {
        grid-template-columns: 1fr;
      }

      .spinner-wrap {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

<div class="login-container" style="max-width: 420px; animation: modalFadeIn 0.3s ease;">
  <div class="login-logo"><i class="bi bi-boxes"></i></div>
  <div class="login-title" style="margin-bottom: 4px;">MATCALL SYSTEM</div>
  <div class="login-subtitle" style="margin-bottom: 24px;">กรุณาลงชื่อเข้าใช้งานระบบเพื่อดำเนินการต่อ</div>

  <form id="universal-login-form" style="text-align: left;">
    <div class="mb-3">
      <label class="form-label" style="font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 6px;">รหัสพนักงาน (Employee ID) *</label>
      <div class="input-group">
        <span class="input-group-text" style="background: #f7fafc; border-color: #cbd5e0; color: #718096; border-radius: 8px 0 0 8px;"><i class="bi bi-person-fill"></i></span>
        <input type="text" id="login-username" class="form-control" style="font-size: 14px; border-radius: 0 8px 8px 0; border-color: #cbd5e0; height: 44px; padding-left: 12px;" required placeholder="ระบุรหัสพนักงาน เช่น 550101" autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label" style="font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 6px;">รหัสผ่าน (Password) *</label>
      <div class="input-group">
        <span class="input-group-text" style="background: #f7fafc; border-color: #cbd5e0; color: #718096; border-radius: 8px 0 0 8px;"><i class="bi bi-key-fill"></i></span>
        <input type="password" id="login-password" class="form-control" style="font-size: 14px; border-radius: 0 8px 8px 0; border-color: #cbd5e0; height: 44px; padding-left: 12px;" required placeholder="ระบุรหัสผ่าน">
      </div>
    </div>
    
    <button type="submit" class="btn btn-primary w-100" style="background: linear-gradient(135deg, #1d3a70, #0c8a7e); border: none; padding: 12px; font-weight: 600; border-radius: 8px; font-size: 14px; height: 46px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(12, 138, 126, 0.2);">
      <i class="bi bi-box-arrow-in-right"></i> ลงชื่อเข้าใช้งาน
    </button>
  </form>
</div>

<style>
  @keyframes modalFadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('universal-login-form');
    
    if (loginForm) {
      loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const usernameInput = document.getElementById('login-username').value.trim();
        const passwordInput = document.getElementById('login-password').value;
        
        try {
          // Fetch users from API
          const users = await API.getUsers();
          const targetUser = users.find(u => u.username.toLowerCase() === usernameInput.toLowerCase());
          
          if (!targetUser) {
            alert('ไม่พบรหัสพนักงานนี้ในระบบ! (Employee ID not found)');
            return;
          }
          
          const correctPassword = targetUser.password || targetUser.username;
          if (passwordInput !== correctPassword) {
            alert('รหัสผ่านไม่ถูกต้อง! (Incorrect Password)');
            return;
          }
          
          // Set user session and redirect
          Auth.setUser(targetUser);
          window.location.href = 'index.html';
        } catch (err) {
          console.error(err);
          alert('เกิดข้อผิดพลาดในการลงชื่อเข้าใช้: ' + err.message);
        }
      };
    }
  });
</script>
</body>
</html>
